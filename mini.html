<!DOCTYPE html>
<html lang="en">
<head>
    <title>Online Book Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #4a90e2; color: #fff; padding: 20px; text-align: center; }
        nav { background: #333; padding: 10px; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .hero { background: #e6f2ff; padding: 40px; text-align: center; }
        .hero h1 { margin: 0; font-size: 36px; }
        .section-title { text-align: center; margin: 30px 0 10px; font-size: 24px; }
        .books { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; padding: 20px; }
        .book-card { width: 180px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; text-align: center; }
        .book-card img { width: 100%; border-radius: 8px; }
        footer { background: #333; color: white; padding: 15px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Online Book Store</h1>
        <p>Your one-stop shop for all genres!</p>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="hero">
        <h1>Welcome to the World of Books</h1>
    </div>

    <h2 class="section-title">Featured Books</h2>
    <div class="books">
        <div class="book-card">
            <img src="https://via.placeholder.com/150" alt="Book 1" />
            <h3>Book Title 1</h3>
            <p>$10.99</p>
        </div>
        <div class="book-card">
            <img src="https://via.placeholder.com/150" alt="Book 2" />
            <h3>Book Title 2</h3>
            <p>$12.99</p>
        </div>
        <div class="book-card">
            <img src="https://via.placeholder.com/150" alt="Book 3" />
            <h3>Book Title 3</h3>
            <p>$8.99</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Online Book Store | All Rights Reserved</p>
    </footer>
</body>
</html>
